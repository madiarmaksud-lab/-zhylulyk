<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Жылу - Қайырымдылық анкетасы</title>
    <style>
        body { font-family: sans-serif; background-color: #fffaf0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #d35400; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #e67e22; color: white; cursor: pointer; border: none; }
        .admin-section { margin-top: 30px; border-top: 2px dashed #e67e22; padding-top: 20px; }
        ul { list-style: none; padding: 0; }
        li { background: #f9f9f9; margin: 5px 0; padding: 10px; border-left: 5px solid #e67e22; }
    </style>
</head>
<body>

<div class="container">
    <h2>"Жылу" жобасы: Анкета толтыру</h2>
    <input type="text" id="userName" placeholder="Аты-жөніңізді жазыңыз">
    <input type="text" id="userHelp" placeholder="Қандай көмек керек немесе бере аласыз?">
    <button onclick="saveData()">Жіберу</button>

    <div class="admin-section">
        <h3>Тіркелген адамдар тізімі (Админ үшін):</h3>
        <ul id="userList"></ul>
        <button onclick="clearData()" style="background: grey; font-size: 12px;">Тізімді тазалау</button>
    </div>
</div>

<script>
    // Мәліметті сақтау функциясы
    function saveData() {
        const name = document.getElementById('userName').value;
        const help = document.getElementById('userHelp').value;
        
        if(name && help) {
            let users = JSON.parse(localStorage.getItem('users')) || [];
            users.push({name: name, help: help});
            localStorage.setItem('users', JSON.stringify(users));
            alert("Мәлімет сақталды!");
            displayData();
        }
    }

    // Мәліметті экранға шығару
    function displayData() {
        const list = document.getElementById('userList');
        list.innerHTML = "";
        let users = JSON.parse(localStorage.getItem('users')) || [];
        users.forEach(user => {
            let li = document.createElement('li');
            li.textContent = `${user.name} — ${user.help}`;
            list.appendChild(li);
        });
    }

    function clearData() {
        localStorage.removeItem('users');
        displayData();
    }

    // Бет ашылғанда тізімді көрсету
    displayData();
</script>

</body>
</html>
